server:
  port: ${SERVER_PORT:5050}

spring:
  application:
    name: dsa-tracker
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/dsa_tracker}
    username: ${DB_USERNAME:rakesh}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  name: dsa-tracker
  backup:
    enabled: ${BACKUP_ENABLED:true}
    cron: ${BACKUP_CRON:0 0 0 * * *}
    max-files: ${BACKUP_MAX_FILES:20}
  github:
    username: ${GITHUB_USERNAME:rak626}
    branch: ${GITHUB_BRANCH:main}
    token: ${GITHUB_TOKEN:}
  security:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

logging:
  level:
    com.rakesh.dsa.tracker: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/dsa-tracker.log
