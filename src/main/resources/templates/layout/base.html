<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" 
      th:fragment="base(title, activeNav, content, scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | DSA Tracker'">DSA Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css?v=3}">
    <link rel="stylesheet" th:href="@{/css/autosuggest.css?v=3}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <th:block th:if="${scripts != null}" th:replace="${scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout/header :: header(${activeNav})}"></th:block>
    
    <main class="main-content">
        <div class="container">
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>
    
    <th:block th:replace="~{layout/footer :: footer}"></th:block>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/js/autosuggest.js" defer></script>
</body>
</html>
