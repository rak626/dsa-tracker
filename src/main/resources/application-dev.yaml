server:
  port: 7008

spring:
  application:
    name: dsa-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/dsa_tracker
    username: rakesh
    password: rakesh123_admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  name: dsa-tracker
  backup:
    enabled: true
    cron: "0 0 0 * * *"
    max-files: 20
  github:
    username: rak626
    branch: main
    token: ${GITHUB_BACKUP_TOKEN:}
  security:
    admin-username: admin
    admin-password: admin123

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.rakesh.dsa.tracker: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
